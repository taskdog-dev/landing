<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <!-- Dog ears -->
  <ellipse cx="10" cy="11" rx="4" ry="5" fill="#f59e0b" transform="rotate(-15 10 11)"/>
  <ellipse cx="22" cy="11" rx="4" ry="5" fill="#f59e0b" transform="rotate(15 22 11)"/>
  <!-- Dog head -->
  <ellipse cx="16" cy="17" rx="9" ry="8" fill="#f59e0b"/>
  <!-- Snout -->
  <ellipse cx="16" cy="21" rx="5" ry="3.5" fill="#fbbf24"/>
  <!-- Nose -->
  <ellipse cx="16" cy="19.5" rx="2" ry="1.5" fill="#1a1a1a"/>
  <!-- Eyes -->
  <circle cx="12.5" cy="15" r="1.5" fill="#1a1a1a"/>
  <circle cx="19.5" cy="15" r="1.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="13" cy="14.5" r="0.5" fill="white"/>
  <circle cx="20" cy="14.5" r="0.5" fill="white"/>
</svg>
